<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" href="data:,">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saúde Prime — Sistema Comercial</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

:root{
  --navy:#1f1e1e;--navy2:#2a2929;--navy3:#141414;
  --gold:#ffffff;--gold2:#e8e8e8;
}

body{font-family:"Outfit",system-ui,sans-serif;background:var(--navy)}

/* ── SWITCHER BAR ── */
.switcher{
  background:var(--navy3);
  display:flex;align-items:center;
  height:56px;padding:0 1.25rem;gap:4px;
  border-bottom:1px solid rgba(255,255,255,.07);
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
.logo-wrap{display:flex;align-items:center;margin-right:12px}
.logo-img{height:42px;object-fit:contain}
.logo-fallback{
  font-family:"Playfair Display",Georgia,serif;
  font-size:13px;font-weight:600;
  color:var(--gold);letter-spacing:.03em;display:none;
}
.sep{width:1px;height:22px;background:rgba(255,255,255,.14);margin:0 10px}
.sw-btn{
  padding:0 15px;height:42px;
  border:none;background:transparent;
  color:rgba(255,255,255,.48);
  font-family:"Outfit",sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;letter-spacing:.03em;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color .15s,border-color .15s;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.sw-btn:hover{color:rgba(255,255,255,.8)}
.sw-btn.active{color:#fff;border-bottom-color:rgba(255,255,255,.85)}
.sw-btn svg{width:13px;height:13px;flex-shrink:0;opacity:.85}

/* usuário logado na barra */
.user-info{
  margin-left:auto;display:flex;align-items:center;gap:10px;
  font-family:"Outfit",sans-serif;font-size:12px;color:rgba(255,255,255,.5);
}
.user-nome{color:rgba(255,255,255,.75);font-weight:500}
.btn-sair,.btn-admin{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.6);border-radius:5px;
  padding:4px 12px;font-size:11px;font-family:"Outfit",sans-serif;
  cursor:pointer;transition:background .15s;white-space:nowrap;
}
.btn-sair:hover,.btn-admin:hover{background:rgba(255,255,255,.15);color:#fff}
.btn-admin{color:#7dd3fc;border-color:rgba(125,211,252,.25)}
.btn-admin:hover{background:rgba(125,211,252,.1);color:#7dd3fc}

@media(max-width:640px){
  .sw-btn{padding:0 10px;font-size:11px;gap:4px}
  .sep{margin:0 6px}.logo-img{height:32px}
  .user-nome{display:none}
}

/* ── IFRAMES ── */
.frames{height:calc(100vh - 56px);position:relative}
iframe{
  position:absolute;top:0;left:0;width:100%;height:100%;
  border:none;display:none;-webkit-overflow-scrolling:touch;
}
iframe.visible{display:block}

/* ── OVERLAY BASE ── */
.overlay{
  position:fixed;inset:0;background:var(--navy3);
  display:flex;align-items:center;justify-content:center;
  z-index:9999;
}
.overlay.hidden{display:none}

/* ── AUTH BOX ── */
.auth-box{
  background:var(--navy2);border:1px solid rgba(255,255,255,.1);
  border-radius:12px;padding:36px;width:360px;
  display:flex;flex-direction:column;gap:18px;
  box-shadow:0 8px 40px rgba(0,0,0,.5);
}
.auth-logo{
  font-family:"Playfair Display",Georgia,serif;
  font-size:20px;font-weight:600;color:#fff;text-align:center;letter-spacing:.03em;
}
.auth-logo small{
  display:block;font-size:11px;font-family:"Outfit",sans-serif;
  color:rgba(255,255,255,.4);font-weight:400;margin-top:4px;
  letter-spacing:.06em;text-transform:uppercase;
}
/* tabs */
.auth-tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:2px}
.auth-tab{
  flex:1;padding:8px;background:none;border:none;
  font-family:"Outfit",sans-serif;font-size:12px;font-weight:500;
  color:rgba(255,255,255,.35);cursor:pointer;letter-spacing:.04em;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;
}
.auth-tab.active{color:#fff;border-bottom-color:#fff}
/* form sections */
.auth-form{display:flex;flex-direction:column;gap:14px}
.auth-form.hidden{display:none}
.auth-box label{
  font-size:11px;font-weight:500;color:rgba(255,255,255,.5);
  letter-spacing:.05em;text-transform:uppercase;
  display:flex;flex-direction:column;gap:5px;
}
.auth-box input{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:7px;padding:10px 14px;color:#fff;
  font-family:"Outfit",sans-serif;font-size:14px;
  outline:none;transition:border-color .15s;
}
.auth-box input:focus{border-color:rgba(255,255,255,.4)}
.auth-btn{
  background:#fff;color:#1a1a1a;border:none;border-radius:7px;
  padding:12px;font-family:"Outfit",sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;transition:opacity .15s;margin-top:4px;
}
.auth-btn:hover{opacity:.88}
.auth-btn:disabled{opacity:.4;cursor:not-allowed}
.auth-msg{font-size:12px;text-align:center;display:none}
.auth-msg.error{color:#ff6b6b}
.auth-msg.success{color:#86efac}

/* ── ADMIN PANEL ── */
#admin-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  display:flex;align-items:center;justify-content:center;
  z-index:8000;
}
#admin-overlay.hidden{display:none}
.admin-box{
  background:#1a1a1a;border:1px solid rgba(255,255,255,.12);
  border-radius:14px;width:680px;max-width:95vw;max-height:85vh;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 16px 60px rgba(0,0,0,.6);
}
.admin-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.08);
}
.admin-header h2{
  font-size:16px;font-weight:600;color:#fff;font-family:"Outfit",sans-serif;
}
.admin-close{
  background:none;border:none;color:rgba(255,255,255,.4);
  font-size:20px;cursor:pointer;padding:4px 8px;transition:color .15s;
}
.admin-close:hover{color:#fff}
.admin-body{overflow-y:auto;padding:20px 24px;flex:1}
.admin-table{width:100%;border-collapse:collapse;font-family:"Outfit",sans-serif;font-size:13px}
.admin-table th{
  text-align:left;padding:8px 10px;
  color:rgba(255,255,255,.35);font-size:10px;font-weight:500;
  letter-spacing:.08em;text-transform:uppercase;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.admin-table td{
  padding:10px 10px;color:rgba(255,255,255,.75);
  border-bottom:1px solid rgba(255,255,255,.05);vertical-align:middle;
}
.admin-table tr:last-child td{border-bottom:none}
.badge-role{
  font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;
  background:rgba(125,211,252,.12);color:#7dd3fc;
}
.badge-role.admin{background:rgba(251,191,36,.12);color:#fbbf24}
.badge-status{
  font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;
}
.badge-status.ativo{background:rgba(134,239,172,.12);color:#86efac}
.badge-status.inativo{background:rgba(255,107,107,.12);color:#ff6b6b}
.btn-toggle,.btn-del{
  border:none;border-radius:5px;padding:4px 10px;
  font-size:11px;font-family:"Outfit",sans-serif;font-weight:500;
  cursor:pointer;transition:opacity .15s;
}
.btn-toggle{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
.btn-toggle:hover{opacity:.75}
.btn-del{background:rgba(255,107,107,.15);color:#ff6b6b;margin-left:6px}
.btn-del:hover{opacity:.75}
.admin-loading{color:rgba(255,255,255,.35);text-align:center;padding:32px;font-family:"Outfit",sans-serif;font-size:14px}
</style>
</head>
<body>

<!-- AUTH OVERLAY -->
<div id="auth-overlay" class="overlay">
  <div class="auth-box">
    <div class="auth-logo">
      Saúde Prime
      <small>Sistema Comercial</small>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Entrar</button>
      <button class="auth-tab" id="tab-reg" onclick="switchTab('reg')">Cadastrar</button>
    </div>

    <!-- LOGIN -->
    <div class="auth-form" id="form-login">
      <label>Usuário<input type="text" id="lg-user" autocomplete="username" placeholder="seu usuário"></label>
      <label>Senha<input type="password" id="lg-pass" autocomplete="current-password" placeholder="••••••••"></label>
      <div class="auth-msg error" id="lg-err">Usuário ou senha incorretos.</div>
      <button class="auth-btn" id="lg-btn" onclick="doLogin()">Entrar</button>
    </div>

    <!-- CADASTRO -->
    <div class="auth-form hidden" id="form-reg">
      <label>Nome completo<input type="text" id="rg-nome" autocomplete="name" placeholder="Ex: João Silva"></label>
      <label>Usuário<input type="text" id="rg-user" autocomplete="username" placeholder="sem espaços, ex: joaosilva"></label>
      <label>Senha<input type="password" id="rg-pass" autocomplete="new-password" placeholder="mínimo 6 caracteres"></label>
      <label>Confirmar senha<input type="password" id="rg-pass2" autocomplete="new-password" placeholder="repita a senha"></label>
      <div class="auth-msg error" id="rg-err"></div>
      <button class="auth-btn" id="rg-btn" onclick="doRegister()">Criar conta</button>
    </div>
  </div>
</div>

<!-- ADMIN OVERLAY -->
<div id="admin-overlay" class="hidden">
  <div class="admin-box">
    <div class="admin-header">
      <h2>Gerenciar Corretores</h2>
      <button class="admin-close" onclick="closeAdmin()">✕</button>
    </div>
    <div class="admin-body" id="admin-body">
      <div class="admin-loading">Carregando...</div>
    </div>
  </div>
</div>

    <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1 12h3v2H1v-2zm4-4h3v6H5V8zm4-3h3v9H9V5zm4-3h3v12h-3V2z"/></svg>

<div class="frames">
  <iframe id="cotador" src="cotador-planos-saude.html" class="visible"></iframe>
  <iframe id="apres"   src="apresentacao-executiva.html"></iframe>
</div>

<script>
const API = 'http://127.0.0.1:8000';

/* ── Tabs login/cadastro ── */
function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('tab-login').classList.toggle('active', isLogin);
  document.getElementById('tab-reg').classList.toggle('active', !isLogin);
  document.getElementById('form-login').classList.toggle('hidden', !isLogin);
  document.getElementById('form-reg').classList.toggle('hidden', isLogin);
  clearMsgs();
}

function clearMsgs() {
  ['lg-err','rg-err'].forEach(id => {
    const el = document.getElementById(id);
    el.style.display = 'none'; el.textContent = '';
  });
}

/* ── Login ── */
async function doLogin() {
  const btn = document.getElementById('lg-btn');
  const err = document.getElementById('lg-err');
  const user = document.getElementById('lg-user').value.trim();
  const pass = document.getElementById('lg-pass').value;
  if (!user || !pass) return;
  btn.disabled = true; err.style.display = 'none';
  try {
    const res = await fetch(`${API}/api/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username: user, password: pass})
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    onAuthSuccess(data);
  } catch {
    err.style.display = 'block';
    btn.disabled = false;
  }
}

/* ── Cadastro ── */
async function doRegister() {
  const btn = document.getElementById('rg-btn');
  const err = document.getElementById('rg-err');
  const nome = document.getElementById('rg-nome').value.trim();
  const user = document.getElementById('rg-user').value.trim();
  const pass = document.getElementById('rg-pass').value;
  const pass2 = document.getElementById('rg-pass2').value;

  err.style.display = 'none';
  if (!nome || !user || !pass) { showErr(err, 'Preencha todos os campos.'); return; }
  if (pass !== pass2) { showErr(err, 'As senhas não coincidem.'); return; }
  if (pass.length < 6) { showErr(err, 'Senha deve ter ao menos 6 caracteres.'); return; }

  btn.disabled = true;
  try {
    const res = await fetch(`${API}/api/register`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({nome, username: user, password: pass})
    });
    const data = await res.json();
    if (!res.ok) { showErr(err, data.detail || 'Erro ao cadastrar.'); btn.disabled = false; return; }
    onAuthSuccess(data);
  } catch {
    showErr(err, 'Servidor indisponível. Tente novamente.');
    btn.disabled = false;
  }
}

function showErr(el, msg) {
  el.textContent = msg; el.style.display = 'block';
}

/* ── Pós-autenticação ── */
function onAuthSuccess(data) {
  sessionStorage.setItem('sp_token', data.access_token);
  sessionStorage.setItem('sp_nome', data.nome || '');
  sessionStorage.setItem('sp_role', data.role || 'corretor');
  document.getElementById('auth-overlay').classList.add('hidden');
  applyUserUI(data.nome, data.role);
}

function applyUserUI(nome, role) {
  document.getElementById('user-nome-bar').textContent = nome || '';
  const adminBtn = document.getElementById('btn-admin-panel');
  if (role === 'admin') adminBtn.classList.remove('hidden');
  else adminBtn.classList.add('hidden');
}

function doLogout() {
  sessionStorage.clear();
  document.getElementById('auth-overlay').classList.remove('hidden');
  document.getElementById('user-nome-bar').textContent = '';
  document.getElementById('btn-admin-panel').classList.add('hidden');
  switchTab('login');
}

/* ── Admin panel ── */
async function openAdmin() {
  document.getElementById('admin-overlay').classList.remove('hidden');
  await loadUsers();
}

function closeAdmin() {
  document.getElementById('admin-overlay').classList.add('hidden');
}

async function loadUsers() {
  const body = document.getElementById('admin-body');
  body.innerHTML = '<div class="admin-loading">Carregando...</div>';
  const token = sessionStorage.getItem('sp_token');
  try {
    const res = await fetch(`${API}/api/admin/users`, {
      headers: {Authorization: `Bearer ${token}`}
    });
    const users = await res.json();
    body.innerHTML = renderUsersTable(users);
  } catch {
    body.innerHTML = '<div class="admin-loading">Erro ao carregar usuários.</div>';
  }
}

function renderUsersTable(users) {
  const rows = users.map(u => `
    <tr>
      <td>${u.nome || '—'}</td>
      <td style="color:rgba(255,255,255,.5)">${u.username}</td>
      <td><span class="badge-role ${u.role}">${u.role}</span></td>
      <td><span class="badge-status ${u.ativo ? 'ativo' : 'inativo'}">${u.ativo ? 'Ativo' : 'Inativo'}</span></td>
      <td style="white-space:nowrap">
        ${u.role !== 'admin' ? `
          <button class="btn-toggle" onclick="toggleUser(${u.id}, this)">${u.ativo ? 'Desativar' : 'Ativar'}</button>
          <button class="btn-del" onclick="deleteUser(${u.id}, this)">Remover</button>
        ` : '—'}
      </td>
    </tr>`).join('');
  return `
    <table class="admin-table">
      <thead><tr>
        <th>Nome</th><th>Usuário</th><th>Perfil</th><th>Status</th><th>Ações</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function toggleUser(id, btn) {
  btn.disabled = true;
  const token = sessionStorage.getItem('sp_token');
  const res = await fetch(`${API}/api/admin/users/${id}/toggle`, {
    method:'PATCH', headers:{Authorization:`Bearer ${token}`}
  });
  if (res.ok) await loadUsers();
  else btn.disabled = false;
}

async function deleteUser(id, btn) {
  if (!confirm('Remover este corretor? Esta ação não pode ser desfeita.')) return;
  btn.disabled = true;
  const token = sessionStorage.getItem('sp_token');
  const res = await fetch(`${API}/api/admin/users/${id}`, {
    method:'DELETE', headers:{Authorization:`Bearer ${token}`}
  });
  if (res.ok) await loadUsers();
  else btn.disabled = false;
}

/* ── Navegação ── */
function show(id, btn) {
  document.querySelectorAll('.sw-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('iframe').forEach(f => f.classList.remove('visible'));
  btn.classList.add('active');
  document.getElementById(id).classList.add('visible');
}

function syncApres(data) {
  document.querySelectorAll('.sw-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('iframe').forEach(f => f.classList.remove('visible'));
  const apresFrame = document.getElementById('apres');
  apresFrame.classList.add('visible');
  if (apresFrame.contentWindow && apresFrame.contentWindow.receiveFromCotador) {
    apresFrame.contentWindow.receiveFromCotador(data);
  } else {
    apresFrame.addEventListener('load', () => apresFrame.contentWindow.receiveFromCotador(data), {once:true});
  }
}

/* ── Enter nos inputs ── */
document.getElementById('lg-pass').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
document.getElementById('rg-pass2').addEventListener('keydown', e => { if (e.key==='Enter') doRegister(); });

/* ── Verifica sessão ao carregar ── */
(async function checkSession() {
  const token = sessionStorage.getItem('sp_token');
  if (!token) return;
  try {
    const res = await fetch(`${API}/api/me`, {headers:{Authorization:`Bearer ${token}`}});
    if (res.ok) {
      const data = await res.json();
      document.getElementById('auth-overlay').classList.add('hidden');
      applyUserUI(data.nome, data.role);
    }
  } catch {}
})();
</script>
