<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saúde Prime — Sistema Comercial</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

:root{
  --navy:#0f2340;--navy2:#1a3a5c;--navy3:#0a1929;
  --gold:#c9a227;--gold2:#e8c83a;
}

body{font-family:"Outfit",system-ui,sans-serif;background:var(--navy)}

/* ── SWITCHER BAR ── */
.switcher{
  background:var(--navy3);
  display:flex;align-items:center;
  height:42px;padding:0 1.25rem;gap:4px;
  border-bottom:1px solid rgba(255,255,255,.07);
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}

.logo-wrap{display:flex;align-items:center;margin-right:12px}
.logo-img{height:28px;object-fit:contain}
.logo-fallback{
  font-family:"Playfair Display",Georgia,serif;
  font-size:13px;font-weight:600;
  color:var(--gold);letter-spacing:.03em;
  display:none;
}

.sep{width:1px;height:22px;background:rgba(255,255,255,.14);margin:0 10px}

.sw-btn{
  padding:0 15px;height:42px;
  border:none;background:transparent;
  color:rgba(255,255,255,.48);
  font-family:"Outfit",sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;letter-spacing:.03em;
  border-bottom:2px solid transparent;
  margin-bottom:-1px;
  transition:color .15s,border-color .15s;
  display:flex;align-items:center;gap:6px;
  white-space:nowrap;
}
.sw-btn:hover{color:rgba(255,255,255,.8)}
.sw-btn.active{color:#fff;border-bottom-color:var(--gold)}
.sw-btn svg{width:13px;height:13px;flex-shrink:0;opacity:.85}

.badge{
  font-size:9px;font-weight:600;
  background:rgba(201,162,39,.22);
  border:1px solid rgba(201,162,39,.45);
  color:var(--gold2);
  padding:1px 7px;border-radius:20px;
  letter-spacing:.06em;
}

/* ── USUÁRIO / LOGOUT ── */
.user-area{
  margin-left:auto;
  display:flex;align-items:center;gap:10px;
}
.user-nome{
  font-size:11px;color:rgba(255,255,255,.55);
  white-space:nowrap;
}
.btn-logout{
  font-size:11px;color:rgba(255,255,255,.4);
  background:none;border:1px solid rgba(255,255,255,.15);
  border-radius:5px;padding:3px 9px;cursor:pointer;
  font-family:"Outfit",sans-serif;
  transition:all .15s;
}
.btn-logout:hover{color:#fff;border-color:rgba(255,255,255,.4)}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .badge{display:none}
  .sw-btn{padding:0 10px;font-size:11px;gap:4px}
  .sep{margin:0 6px}
  .logo-img{height:22px}
  .user-nome{display:none}
}
@media(max-width:380px){
  .sw-btn{padding:0 8px;font-size:10px}
  .sep{margin:0 3px}
  .logo-wrap{margin-right:6px}
}

/* ── IFRAMES ── */
.frames{height:calc(100vh - 42px);position:relative}
iframe{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  border:none;
  display:none;
  -webkit-overflow-scrolling:touch;
}
iframe.visible{display:block}

/* ── HISTÓRICO ── */
#historico-panel{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:none;overflow-y:auto;
  background:#f4f1ec;
  padding:2rem;
}
#historico-panel.visible{display:block}

.hist-header{
  max-width:900px;margin:0 auto 1.5rem;
  display:flex;align-items:center;gap:12px;
}
.hist-header h2{font-size:18px;font-weight:600;color:#0f2340;flex:1}
.hist-search{
  padding:8px 12px;border:1.5px solid #e8e4dc;border-radius:8px;
  font-family:"Outfit",sans-serif;font-size:13px;color:#1a1916;
  outline:none;width:220px;
}
.hist-search:focus{border-color:#0f2340}

.hist-table-wrap{max-width:900px;margin:0 auto;overflow-x:auto}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07)}
th{background:#0f2340;color:#fff;font-size:11px;font-weight:500;padding:10px 14px;text-align:left;letter-spacing:.04em}
td{padding:10px 14px;font-size:13px;color:#1a1916;border-bottom:1px solid #f0ece4}
tr:last-child td{border-bottom:none}
tr:hover td{background:#faf9f6}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.04em}
.tag-win{background:#dcfce7;color:#166534}

.hist-empty{text-align:center;padding:3rem;color:#8a97a6;font-size:14px}
.hist-loading{text-align:center;padding:2rem;color:#8a97a6}
</style>
</head>
<body>

<div class="switcher">
  <div class="logo-wrap">
    <img class="logo-img" src="Logo_Saude_Prime__1_.png" alt="Saúde Prime"
         onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <span class="logo-fallback">Saúde Prime</span>
  </div>

  <div class="sep"></div>

  <button class="sw-btn active" onclick="show('cotador',this)">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M1 12h3v2H1v-2zm4-4h3v6H5V8zm4-3h3v9H9V5zm4-3h3v12h-3V2z"/>
    </svg>
    Cotador
  </button>

  <button class="sw-btn" onclick="show('apres',this)">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M13 1H3a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2V3a2 2 0 00-2-2zm-1 11H4v-1h8v1zm0-3H4V8h8v1zm0-3H4V5h8v1z"/>
    </svg>
    Apresentação Executiva
  </button>

  <button class="sw-btn" onclick="showHistorico(this)">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm.75 7.75H5.5v-1.5h1.75V4h1.5v4.75z"/>
    </svg>
    Histórico
  </button>

  <div class="user-area">
    <span class="badge">SISTEMA COMERCIAL</span>
    <span class="user-nome" id="user-nome"></span>
    <button class="btn-logout" onclick="sair()">Sair</button>
  </div>
</div>

<div class="frames">
  <iframe id="cotador" src="cotador-planos-saude.html" class="visible"></iframe>
  <iframe id="apres"   src="apresentacao-executiva.html"></iframe>

  <!-- Painel de histórico (não é iframe) -->
  <div id="historico-panel">
    <div class="hist-header">
      <h2>Histórico de Cotações</h2>
      <input class="hist-search" id="hist-busca" type="text"
             placeholder="Buscar por cliente..." oninput="buscarCotacoes()">
    </div>
    <div class="hist-table-wrap">
      <div id="hist-content" class="hist-loading">Carregando...</div>
    </div>
  </div>
</div>

<script>
const API = '';

// ── AUTENTICAÇÃO ─────────────────────────────────────────────────────────────
const token    = sessionStorage.getItem('sp_token');
const corretor = JSON.parse(sessionStorage.getItem('sp_corretor') || 'null');

if (!token) {
  window.location.replace('login.html');
}

if (corretor) {
  document.getElementById('user-nome').textContent = corretor.nome;
}

function sair() {
  sessionStorage.removeItem('sp_token');
  sessionStorage.removeItem('sp_corretor');
  window.location.replace('login.html');
}

// ── NAVEGAÇÃO ────────────────────────────────────────────────────────────────
function show(id, btn) {
  document.querySelectorAll('.sw-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('iframe').forEach(f => f.classList.remove('visible'));
  document.getElementById('historico-panel').classList.remove('visible');
  btn.classList.add('active');
  document.getElementById(id).classList.add('visible');
}

function showHistorico(btn) {
  document.querySelectorAll('.sw-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('iframe').forEach(f => f.classList.remove('visible'));
  btn.classList.add('active');
  document.getElementById('historico-panel').classList.add('visible');
  carregarCotacoes();
}

function syncApres(data) {
  const btns = document.querySelectorAll('.sw-btn');
  document.querySelectorAll('.sw-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('iframe').forEach(f => f.classList.remove('visible'));
  document.getElementById('historico-panel').classList.remove('visible');
  btns[1].classList.add('active');
  const apresFrame = document.getElementById('apres');
  apresFrame.classList.add('visible');
  if (apresFrame.contentWindow && apresFrame.contentWindow.receiveFromCotador) {
    apresFrame.contentWindow.receiveFromCotador(data);
  } else {
    apresFrame.addEventListener('load', () => apresFrame.contentWindow.receiveFromCotador(data), {once:true});
  }
}

// ── HISTÓRICO ────────────────────────────────────────────────────────────────
const FAIXAS = ['0-18','19-23','24-28','29-33','34-38','39-43','44-48','49-53','54-58','59+'];

let buscaTimer = null;

function buscarCotacoes() {
  clearTimeout(buscaTimer);
  buscaTimer = setTimeout(carregarCotacoes, 400);
}

async function carregarCotacoes() {
  const busca   = document.getElementById('hist-busca').value;
  const content = document.getElementById('hist-content');
  content.innerHTML = '<div class="hist-loading">Carregando...</div>';

  try {
    const res = await fetch(`${API}/api/cotacoes?busca=${encodeURIComponent(busca)}&limite=50`, {
      headers: { 'Authorization': `Bearer ${token}` },
    });

    if (res.status === 401) { sair(); return; }

    const data = await res.json();

    if (!data.cotacoes.length) {
      content.innerHTML = '<div class="hist-empty">Nenhuma cotação encontrada.</div>';
      return;
    }

    const fmt = v => v ? 'R$ ' + parseFloat(v).toLocaleString('pt-BR',{minimumFractionDigits:2}) : '—';
    const fmtData = d => new Date(d).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});

    content.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Cliente</th>
            <th>Recomendado</th>
            <th>Total</th>
            <th>Tipo</th>
            <th>Data</th>
          </tr>
        </thead>
        <tbody>
          ${data.cotacoes.map(c => `
            <tr>
              <td style="color:#8a97a6">${c.id}</td>
              <td><strong>${c.cliente_nome || '—'}</strong></td>
              <td>${c.winner ? `<span class="tag tag-win">${c.winner.toUpperCase()}</span>` : '—'}</td>
              <td>${fmt(c.total_winner)}</td>
              <td style="color:#8a97a6;font-size:11px">${c.filtro_tipo || '—'}</td>
              <td style="color:#8a97a6;font-size:11px">${fmtData(c.criado_em)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
      <div style="font-size:11px;color:#8a97a6;margin-top:.75rem;text-align:right">
        ${data.total} cotação${data.total !== 1 ? 'ões' : ''} encontrada${data.total !== 1 ? 's' : ''}
      </div>`;

  } catch {
    content.innerHTML = '<div class="hist-empty">Erro ao carregar cotações.</div>';
  }
}
</script>

</body>
</html>
