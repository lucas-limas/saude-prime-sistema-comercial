<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saúde Prime — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:"Outfit",system-ui,sans-serif}
body{
  background:#0a1929;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:2.5rem 2rem;
  width:100%;max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
}

.logo{
  text-align:center;
  margin-bottom:2rem;
}
.logo-title{
  font-size:22px;font-weight:600;color:#0f2340;
  letter-spacing:.02em;
}
.logo-sub{
  font-size:12px;color:#8a97a6;margin-top:4px;
}

.fg{margin-bottom:1.1rem}
label{display:block;font-size:12px;font-weight:500;color:#4a5568;margin-bottom:5px}
input{
  width:100%;padding:10px 12px;
  border:1.5px solid #e8e4dc;border-radius:8px;
  font-family:"Outfit",sans-serif;font-size:14px;color:#1a1916;
  outline:none;transition:border-color .15s;
}
input:focus{border-color:#0f2340}

.btn{
  width:100%;padding:11px;margin-top:.5rem;
  background:#0f2340;color:#fff;
  border:none;border-radius:8px;
  font-family:"Outfit",sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;transition:background .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn:hover{background:#1a3a5c}
.btn:disabled{background:#8a97a6;cursor:not-allowed}

.erro{
  background:#fef2f2;border:1px solid #fecaca;
  color:#b91c1c;border-radius:8px;
  padding:9px 12px;font-size:12px;
  margin-top:1rem;display:none;
}
.erro.on{display:block}

.spinner{
  width:16px;height:16px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .6s linear infinite;display:none;
}
.spinner.on{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-title">Saúde Prime</div>
    <div class="logo-sub">Sistema Comercial — Acesso Restrito</div>
  </div>

  <form id="form" onsubmit="entrar(event)">
    <div class="fg">
      <label>E-mail</label>
      <input id="email" type="email" placeholder="seu@email.com" required autocomplete="email">
    </div>
    <div class="fg">
      <label>Senha</label>
      <input id="senha" type="password" placeholder="••••••" required autocomplete="current-password">
    </div>
    <button class="btn" id="btn" type="submit">
      <div class="spinner" id="spin"></div>
      <span id="btn-txt">Entrar</span>
    </button>
  </form>

  <div class="erro" id="erro"></div>
</div>

<script>
const API = 'http://localhost:3001';

// Se já tem token válido, vai direto pro sistema
if (sessionStorage.getItem('sp_token')) {
  window.location.replace('sistema-saude-prime.html');
}

async function entrar(e) {
  e.preventDefault();
  const btn  = document.getElementById('btn');
  const spin = document.getElementById('spin');
  const txt  = document.getElementById('btn-txt');
  const erro = document.getElementById('erro');

  btn.disabled = true;
  spin.classList.add('on');
  txt.textContent = 'Entrando...';
  erro.classList.remove('on');

  try {
    const res = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        senha: document.getElementById('senha').value,
      }),
    });

    const data = await res.json();

    if (!res.ok) {
      erro.textContent = data.erro || 'Erro ao fazer login.';
      erro.classList.add('on');
      return;
    }

    sessionStorage.setItem('sp_token',    data.token);
    sessionStorage.setItem('sp_corretor', JSON.stringify(data.corretor));
    window.location.replace('sistema-saude-prime.html');

  } catch {
    erro.textContent = 'Não foi possível conectar ao servidor. Verifique se o backend está rodando.';
    erro.classList.add('on');
  } finally {
    btn.disabled = false;
    spin.classList.remove('on');
    txt.textContent = 'Entrar';
  }
}
</script>
</body>
</html>
